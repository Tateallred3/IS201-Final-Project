<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sales Goal Calculator</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background: #004a99; color: white; }
        .app-card { background: white; color: #333; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 400px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        #result { margin-top: 20px; font-weight: bold; font-size: 18px; color: #004a99; }
    </style>
</head>
<body>
    <div class="app-card">
        <h2>Sales Target Tool</h2>
        <p>Calculate how many deals you need to hit your revenue goal.</p>
        
        <label>Monthly Revenue Goal ($)</label>
        <input type="number" id="goal" placeholder="e.g. 10000">
        
        <label>Average Deal Value ($)</label>
        <input type="number" id="avgValue" placeholder="e.g. 500">
        
        <button onclick="calculate()">Calculate Required Deals</button>
        
        <div id="result"></div>
        <br>
        <a href="scratch.html">Return to Scratch Page</a>
    </div>

    <script>
        function calculate() {
            const goal = document.getElementById('goal').value;
            const avg = document.getElementById('avgValue').value;
            if (goal && avg) {
                const deals = Math.ceil(goal / avg);
                document.getElementById('result').innerText = "You need to close " + deals + " deals this month!";
            } else {
                document.getElementById('result').innerText = "Please enter valid numbers.";
            }
        }
    </script>
</body>
</html>
